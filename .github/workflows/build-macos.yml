name: Build macOS app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install desktop build dependencies
        run: python -m pip install ".[desktop,build]"

      - name: Build app bundle
        run: PYTHON=python sh scripts/build_macos_app.sh

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Voice-Weather-macOS
          path: dist/Voice-Weather-macOS.zip
          if-no-files-found: error
